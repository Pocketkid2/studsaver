<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudSaver</title>
    <meta name="description" content="View contents of a BrickLink .cart file offline in your browser">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>StudSaver</h1>
            <p>Upload your <code>.cart</code> file to view its contents.</p>
        </header>

        <main>
            <div class="upload-zone" id="upload-zone">
                <input type="file" id="file-input" accept=".cart" hidden>
                <div class="upload-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <h3>Drag & Drop your .cart file here</h3>
                    <p>or <button type="button" id="browse-btn">Browse Files</button></p>
                </div>
            </div>

            <div class="stats-container" id="stats-container" style="display: none;">
                <div class="stat-box">
                    <div class="stat-value" id="stat-items">0</div>
                    <div class="stat-label">Inventory Items</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-stores">0</div>
                    <div class="stat-label">Stores</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-parts">0</div>
                    <div class="stat-label">Total Parts</div>
                </div>
                <div class="stat-box" id="stat-box-recommendations">
                    <div class="stat-value" id="stat-recommendations" style="color: #22c55e; background: none; -webkit-text-fill-color: initial;">0</div>
                    <div class="stat-label">Pick-a-Brick<br>Recommendations</div>
                </div>
                <div class="stat-box" id="stat-box-issues">
                    <div class="stat-value" id="stat-issues" style="color: #ef4444; background: none; -webkit-text-fill-color: initial;">0</div>
                    <div class="stat-label">Issues</div>
                </div>
            </div>

            <div class="filter-container" id="filter-container" style="display: none;">
                <label class="filter-option">
                    <input type="checkbox" id="debug-mode-toggle">
                    Debug mode
                </label>
                <label class="filter-option">
                    <input type="checkbox" id="filter-parts-only">
                    Show Parts only
                </label>
                <button type="button" id="get-all-lego-prices-btn" class="btn-primary" style="margin-left: auto;">Get All LEGO Prices</button>
            </div>

            <div class="table-container" id="table-container" style="display: none;">
                <table id="cart-table">
                    <thead>
                        <tr>
                            <th class="col-debug">Store ID</th>
                            <th class="col-debug">Lot ID</th>
                            <th>Quantity</th>
                            <th>Type</th>
                            <th>Condition</th>
                            <th>Color</th>
                            <th>Description</th>
                            <th>Design ID</th>
                            <th>Price per</th>
                            <th>LEGO Price</th>
                        </tr>
                    </thead>
                    <tbody id="cart-body">
                        <!-- Rows will be populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
